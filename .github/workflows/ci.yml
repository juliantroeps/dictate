name: CI

on:
  push:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/swiftlint
            /usr/local/Cellar/swift-format
          key: brew-${{ runner.os }}-swiftlint-swift-format

      - name: Install lint tools
        run: brew install swiftlint swift-format

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Lint
        run: swiftlint lint --strict

      - name: Format lint
        run: swift-format lint --configuration .swiftformat -r Sources Tests
