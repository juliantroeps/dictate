name: CI

on:
  push:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: brew install swiftlint swift-format

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Lint
        run: swiftlint lint --strict

      - name: Format lint
        run: swift-format lint --configuration .swiftformat -r Sources Tests
